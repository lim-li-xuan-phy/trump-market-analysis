name: CI/CD program

on:
  push:
    branches: [ main, master, sql ]
  pull_request:
    branches: [ main, master, sql ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: trump_market_analysis
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'src/python/requirements.txt'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/python/requirements.txt
          pip install pytest

      - name: Configure Test environment
        run: |
          mkdir -p src
          cat <<EOF > src/.env
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=trump_market_analysis
          DB_USER=postgres
          DB_PASSWORD=postgres
          EOF

      - name: Run Pytest Suites
        run: |
          pytest

      - name: Install System Dependencies for C++ (libpq)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev g++

      - name: Compile C++ Binaries on Linux
        run: |
          cd src/cpp
          chmod +x compile.sh
          ./compile.sh
